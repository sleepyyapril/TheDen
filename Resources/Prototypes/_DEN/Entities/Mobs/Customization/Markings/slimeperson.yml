# Eyes

- type: marking
  id: SlimeEyesCyclopsPulsing
  bodyPart: Eyes
  markingCategory: Eyes
  speciesRestriction: [ SlimePerson ]
  coloring:
    default:
      type:
        !type:EyeColoring
        negative: false
  sprites:
  - sprite: _DEN/Mobs/Customization/SlimePerson/eyes.rsi
    state: cyclopspulseeye
  - sprite: _DEN/Mobs/Customization/SlimePerson/eyes.rsi
    state: cyclopspulsering
  shader: unshaded

